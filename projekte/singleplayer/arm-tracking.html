<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arm Tracking - Singleplayer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- MediaPipe Pose -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

  <style>
    :root {
      --bg: #09090b;
      --card-bg: rgba(24, 24, 27, 0.6);
      --card-border: rgba(16, 185, 129, 0.3);
      --text-main: #f8fafc;
      --accent-1: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      color: var(--text-main);
      background-color: var(--bg);
      background-image: radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.1), transparent 70%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    .back-btn {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      padding: 0.8rem 1.5rem;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: var(--text-main);
      text-decoration: none;
      font-weight: 600;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      z-index: 100;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    h1 {
      margin-top: 1rem;
      margin-bottom: 2rem;
      font-size: 3rem;
      background: linear-gradient(135deg, #fff 20%, #a7f3d0 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 1000px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 2rem;
      backdrop-filter: blur(20px);
    }

    .video-view {
      position: relative;
      width: 100%;
      max-width: 800px;
      aspect-ratio: 16/9;
      border-radius: 12px;
      overflow: hidden;
      background-color: #000;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    /* Flip the video horizontally for mirror effect */
    .input_video {
      display: none; /* Hide the raw video, we draw to canvas */
    }

    .output_canvas {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      transform: scaleX(-1); /* Mirror effect */
      object-fit: cover;
    }

    .status-panel {
      margin-top: 2rem;
      text-align: center;
      font-size: 1.2rem;
    }

    #loading {
      color: var(--accent-1);
      font-weight: bold;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }

    .info-hud {
      margin-top: 1rem;
      display: flex;
      gap: 2rem;
      font-size: 1.5rem;
      font-weight: bold;
      flex-wrap: wrap;
      justify-content: center;
    }

    .info-hud span {
      background: rgba(16, 185, 129, 0.2);
      padding: 0.5rem 1rem;
      border-radius: 8px;
    }

    @media (max-width: 768px) {
      h1 { font-size: 2.2rem; margin-bottom: 1rem; }
      .container { padding: 1rem; }
      .video-view {
        aspect-ratio: 3/4; /* Better for mobile portrait */
      }
      .back-btn { top: 0.5rem; left: 0.5rem; padding: 0.5rem 1rem; font-size: 0.9rem; }
      body { padding: 4rem 1rem 1rem 1rem; }
      .info-hud { font-size: 1.2rem; gap: 0.5rem; }
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-btn">◀ Zurück</a>

  <h1>Arm Tracking</h1>

  <div class="container">
    <div class="video-view">
      <video class="input_video"></video>
      <canvas class="output_canvas" width="1280" height="720"></canvas>
    </div>

    <div class="status-panel">
      <p id="loading">Modell wird geladen & Kamera gestartet...</p>
      <div class="info-hud" style="display: none;" id="hud">
        <span id="left-arm">L. Arm: Unbekannt</span>
        <span id="right-arm">R. Arm: Unbekannt</span>
      </div>
    </div>
  </div>

  <script>
    const videoElement = document.getElementsByClassName('input_video')[0];
    const canvasElement = document.getElementsByClassName('output_canvas')[0];
    const canvasCtx = canvasElement.getContext('2d');

    const loadingText = document.getElementById('loading');
    const hud = document.getElementById('hud');
    const leftArmStatus = document.getElementById('left-arm');
    const rightArmStatus = document.getElementById('right-arm');

    function onResults(results) {
      // Setup UI state
      loadingText.style.display = 'none';
      hud.style.display = 'flex';

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

      // Draw original video frame
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      if (results.poseLandmarks) {
        // Draw the pose skeleton
        drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS,
                       {color: '#ffffff', lineWidth: 4});
        drawLandmarks(canvasCtx, results.poseLandmarks,
                      {color: '#10b981', lineWidth: 2, radius: 4});

        // Specific logic for arms (Left Wrist = 15, Right Wrist = 16)
        // MediaPipe coords: 0.0 to 1.0 (Top-left is 0,0)
        const leftWrist = results.poseLandmarks[15];
        const rightWrist = results.poseLandmarks[16];
        const shoulderLeft = results.poseLandmarks[11];
        const shoulderRight = results.poseLandmarks[12];

        // Evaluate simple "arm raised" logic
        // Because of the mirror UI effect we need to think from user perspective.
        // If wrist.y < shoulder.y, the arm is raised
        if(leftWrist.visibility > 0.5 && shoulderLeft.visibility > 0.5) {
          leftArmStatus.innerText = leftWrist.y < shoulderLeft.y ? "L. Arm: OBEN" : "L. Arm: UNTEN";
          leftArmStatus.style.color = leftWrist.y < shoulderLeft.y ? "#10b981" : "white";
        } else {
          leftArmStatus.innerText = "L. Arm: N/A";
        }

        if(rightWrist.visibility > 0.5 && shoulderRight.visibility > 0.5) {
          rightArmStatus.innerText = rightWrist.y < shoulderRight.y ? "R. Arm: OBEN" : "R. Arm: UNTEN";
          rightArmStatus.style.color = rightWrist.y < shoulderRight.y ? "#10b981" : "white";
        } else {
          rightArmStatus.innerText = "R. Arm: N/A";
        }
      }
      canvasCtx.restore();
    }

    const pose = new Pose({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
    }});

    pose.setOptions({
      modelComplexity: 1,
      smoothLandmarks: true,
      enableSegmentation: false,
      smoothSegmentation: false,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    pose.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await pose.send({image: videoElement});
      },
      width: 1280,
      height: 720
    });
    camera.start();
  </script>
</body>
</html>
