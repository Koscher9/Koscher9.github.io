<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Body Runner - Singleplayer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">

  <!-- MediaPipe Pose -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

  <style>
    :root {
      --bg: #09090b;
      --text-main: #f8fafc;
      --accent: #eab308;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      color: var(--text-main);
      background-color: var(--bg);
      overflow: hidden;
      touch-action: none;
    }

    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #000;
      /* removed gradient to let video shine through */
    }

    .ui-layer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .back-btn {
      pointer-events: auto;
      padding: 0.8rem 1.5rem;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: var(--text-main);
      text-decoration: none;
      font-weight: 600;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }
    .back-btn:hover { background: rgba(255, 255, 255, 0.2); }

    .score-board {
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(234, 179, 8, 0.5);
    }

    .center-message {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: auto;
      background: rgba(0,0,0,0.8);
      padding: 3rem;
      border-radius: 20px;
      border: 2px solid var(--accent);
    }

    h1 {
      font-size: 4rem;
      margin-bottom: 2rem;
      background: linear-gradient(135deg, #fff 20%, #fef08a 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p.controls-hint {
      font-size: 1.2rem;
      color: #a1a1aa;
      margin-bottom: 2rem;
    }

    .play-btn {
      padding: 1rem 3rem;
      font-size: 1.5rem;
      font-weight: 800;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 99px;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(234, 179, 8, 0.4);
      transition: transform 0.2s;
    }
    .play-btn:active { transform: scale(0.95); }

    .hidden { display: none !important; }
    
    #loadingText {
      color: var(--accent);
      animation: pulse 1s infinite alternate;
    }
    @keyframes pulse { from{opacity:0.5;} to{opacity:1;} }

  </style>
</head>
<body>

  <video class="input_video" style="display:none;"></video>
  <canvas id="gameCanvas"></canvas>

  <div class="ui-layer">
    <div class="header">
      <a href="index.html" class="back-btn">◀ Zurück</a>
      <div class="score-board" id="scoreValue">0</div>
    </div>

    <!-- Start / Game Over Screen -->
    <div class="center-message" id="menuScreen">
      <h1 id="menuTitle">Body Runner</h1>
      <p class="controls-hint">Bewege deinen Körper, hüpfe oder mache eine Kniebeuge/Liegestütz!<br><br>Alternativ: Pfeiltasten.</p>
      <p id="loadingText">Kamera & Modell laden...</p>
      <button class="play-btn hidden" id="startBtn">START</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const menuScreen = document.getElementById('menuScreen');
    const menuTitle = document.getElementById('menuTitle');
    const startBtn = document.getElementById('startBtn');
    const loadingText = document.getElementById('loadingText');
    const scoreValue = document.getElementById('scoreValue');
    const videoElement = document.querySelector('.input_video');

    let videoFrameImage = null; // Buffer for camera feed
    let poseResults = null;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // -----------------------------------------------------------------
    // 3D Engine & Game state
    // -----------------------------------------------------------------
    const FOV = 400; 
    const CAMERA_Y = 150; 
    const CAMERA_Z = -300; 

    let isGameRunning = false;
    let score = 0;
    let baseSpeed = 2000; 
    let speed = baseSpeed;
    
    const player = {
      targetLane: 0, // Logic lane: -1, 0, 1
      visualLane: 0, // Smooth visual X offset
      y: 0,          
      z: 0,          
      width: 60,
      height: 120,
      color: '#38bdf8', 
      isJumping: false,
      isRolling: false,
      rollTimer: 0,
      jumpVelocity: 0,
      gravity: -2500, 
      jumpPower: 900
    };

    let baselineY = null; // for jump/roll detection

    const LANE_WIDTH = 150;
    let obstacles = [];
    let particles = [];
    
    let lastTime = performance.now();
    let spawnTimer = 0;

    // -----------------------------------------------------------------
    // Actions
    // -----------------------------------------------------------------
    function moveLeft() { if(isGameRunning && player.targetLane > -1 && player.y <= 0) player.targetLane--; }
    function moveRight() { if(isGameRunning && player.targetLane < 1 && player.y <= 0) player.targetLane++; }
    
    function startJump() {
      if (isGameRunning && !player.isJumping && !player.isRolling) {
        player.isJumping = true;
        player.jumpVelocity = player.jumpPower;
      }
    }

    function startRoll() {
      if (isGameRunning && !player.isJumping && !player.isRolling) {
        player.isRolling = true;
        player.rollTimer = 0.8; // ms
        player.height = 60; // duck
      } else if (isGameRunning && player.isJumping) {
        player.jumpVelocity = -player.jumpPower; // fast fall
      }
    }

    // Keyboard Fallback
    window.addEventListener('keydown', (e) => {
      if(e.key === 'ArrowLeft' || e.key === 'a') moveLeft();
      if(e.key === 'ArrowRight' || e.key === 'd') moveRight();
      if(e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') startJump();
      if(e.key === 'ArrowDown' || e.key === 's') startRoll();
    });

    // -----------------------------------------------------------------
    // MediaPipe Integration
    // -----------------------------------------------------------------
    function onPoseResults(results) {
      if (loadingText.style.display !== 'none') {
        loadingText.style.display = 'none';
        startBtn.classList.remove('hidden');
      }

      videoFrameImage = results.image;
      poseResults = results.poseLandmarks;

      if (isGameRunning && poseResults) {
        processBodyTracking(poseResults);
      }
    }

    function processBodyTracking(landmarks) {
        const shoulderLeft = landmarks[11];
        const shoulderRight = landmarks[12];
        
        if (!shoulderLeft || !shoulderRight) return;

        // 1. HORIZONTAL MOVEMENT
        const bodyX = (shoulderLeft.x + shoulderRight.x) / 2;
        const visualX = 1 - bodyX; // Canvas is mirrored! left on screen is > 0.66

        // Set Target Lane based on thirds of the screen
        if (visualX < 0.35) player.targetLane = -1;
        else if (visualX > 0.65) player.targetLane = 1;
        else player.targetLane = 0;

        // 2. VERTICAL MOVEMENT (Jump/Roll)
        const currentY = (shoulderLeft.y + shoulderRight.y) / 2;
        
        if (baselineY === null) {
            baselineY = currentY;
        }

        // Adjust baseline very slowly to account for drift, but only if not currently jumping/rolling
        // and only if the difference isn't huge (which happens during a deliberate jump)
        if (!player.isJumping && !player.isRolling) {
            if (Math.abs(currentY - baselineY) < 0.05) {
                baselineY += (currentY - baselineY) * 0.05;
            }
        }

        // Detect jump (y gets smaller = higher)
        if (currentY < baselineY - 0.12 && !player.isJumping && !player.isRolling) {
            startJump();
        } 
        // Detect roll / pushup (y gets larger = lower)
        else if (currentY > baselineY + 0.18 && !player.isJumping && !player.isRolling) {
            startRoll();
        }
    }

    const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
    pose.setOptions({
      modelComplexity: 1,
      smoothLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    pose.onResults(onPoseResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => { await pose.send({image: videoElement}); },
      width: 1280, height: 720
    });
    camera.start();

    // -----------------------------------------------------------------
    // Game Loop
    // -----------------------------------------------------------------
    function resetGame() {
      player.targetLane = 0;
      player.visualLane = 0;
      player.y = 0;
      player.isJumping = false;
      player.isRolling = false;
      player.height = 120;
      obstacles = [];
      particles = [];
      score = 0;
      speed = baseSpeed;
      baselineY = null; // recalibrate strictly on restart
      lastTime = performance.now();
      isGameRunning = true;
      menuScreen.classList.add('hidden');
    }

    startBtn.addEventListener('click', resetGame);

    function spawnObstacle() {
      const type = Math.random() < 0.4 ? 'UPPER' : 'LOWER'; 
      const isBlockade = Math.random() < 0.25; // 25% chance for a blockade spanning all lanes
      
      let lane = 0;
      let width = 100;

      if (isBlockade) {
          lane = 0; // Center visually
          width = LANE_WIDTH * 3; // covers all 3 lanes
      } else {
          lane = Math.floor(Math.random() * 3) - 1; // -1, 0, or 1
      }
      
      obstacles.push({
        lane: lane,
        z: 5000,     
        y: type === 'UPPER' ? 100 : 0,  
        type: type,  
        width: width,
        height: type === 'UPPER' ? 40 : 80,
        color: type === 'UPPER' ? '#f43f5e' : (isBlockade ? '#a855f7' : '#eab308'),
        isBlockade: isBlockade
      });
    }

    function createExplosion(x, y, z, color) {
      for(let i=0; i<30; i++) {
        particles.push({
          x: x, y: y, z: z,
          vx: (Math.random() - 0.5) * 800,
          vy: Math.random() * 800,
          vz: (Math.random() - 0.5) * 800,
          life: 1.0, color: color
        });
      }
    }

    function project(p3) {
      const dz = p3.z - CAMERA_Z; 
      if (dz <= 0) return null; 

      const scale = FOV / dz;
      const cx = canvas.width / 2;
      const cy = canvas.height / 2 + 100; // Horizon slightly lower 

      const px = cx + (p3.x * scale);
      const py = cy - ((p3.y - CAMERA_Y) * scale); 
      
      return { x: px, y: py, scale: scale };
    }

    function gameLoop(time) {
      requestAnimationFrame(gameLoop);

      let dt = (time - lastTime) / 1000;
      if (dt > 0.1) dt = 0.1; 
      lastTime = time;

      if (!isGameRunning) {
          draw(); // still draw background camera
          return;
      }
      
      // Update
      score += dt * 10;
      speed = baseSpeed + (score * 8); 
      scoreValue.innerText = Math.floor(score);

      // Smooth visual horizontal movement
      player.visualLane += (player.targetLane - player.visualLane) * 15 * dt;

      // Jump/Roll physics
      if (player.isJumping) {
        player.y += player.jumpVelocity * dt;
        player.jumpVelocity += player.gravity * dt;
        if (player.y <= 0) {
          player.y = 0;
          player.isJumping = false;
        }
      }

      if (player.isRolling) {
        player.rollTimer -= dt;
        if (player.rollTimer <= 0) {
          player.isRolling = false;
          player.height = 120; 
        }
      }

      // Spawns
      spawnTimer -= dt;
      if (spawnTimer <= 0) {
        spawnObstacle();
        spawnTimer = 2000 / speed + (Math.random() * 0.4); 
      }

      // Obstacles logic
      for (let i = obstacles.length - 1; i >= 0; i--) {
        let obs = obstacles[i];
        obs.z -= speed * dt;

        // Collision 
        let isLaneCollision = false;
        if (obs.isBlockade) {
            isLaneCollision = true; // spans all lanes
        } else {
            // Targetlane matters for logic, visually they might be transitioning
            isLaneCollision = (obs.lane === player.targetLane);
        }

        if (obs.z > -50 && obs.z < 50 && isLaneCollision) {
          let pBottom = player.y; 
          let pTop = player.y + player.height;
          let oBottom = obs.y;
          let oTop = obs.y + obs.height;

          if (pTop > oBottom && pBottom < oTop) {
            gameOver();
          }
        }

        if (obs.z < CAMERA_Z) obstacles.splice(i, 1);
      }

      // Particles
      for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += player.gravity * dt * 0.5; 
        p.z += p.vz * dt;
        p.z -= speed * dt; 
        p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
      }

      draw();
    }

    function gameOver() {
      isGameRunning = false;
      createExplosion(player.visualLane * LANE_WIDTH, player.y + player.height/2, player.z, player.color);
      
      menuTitle.innerText = "CRASH!";
      startBtn.innerText = "NEUSTART";
      menuScreen.classList.remove('hidden');
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // --- Draw Camera Background ---
      if (videoFrameImage) {
         ctx.save();
         // Make game canvas slightly transparent to see camera
         ctx.globalAlpha = 0.3; 
         ctx.scale(-1, 1); // mirror
         ctx.drawImage(videoFrameImage, -canvas.width, 0, canvas.width, canvas.height);
         ctx.restore();

         // Draw lane separator guides
         ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
         ctx.lineWidth = 2;
         ctx.setLineDash([10, 10]);
         ctx.beginPath();
         // x at 35% and 65% for the boundaries
         ctx.moveTo(canvas.width * 0.35, 0); ctx.lineTo(canvas.width * 0.35, canvas.height);
         ctx.moveTo(canvas.width * 0.65, 0); ctx.lineTo(canvas.width * 0.65, canvas.height);
         ctx.stroke();
         ctx.setLineDash([]);
         
         ctx.fillStyle = "rgba(255,255,255,0.7)";
         ctx.font = "20px Arial";
         ctx.fillText("LANE 1", canvas.width * 0.15, 30);
         ctx.fillText("LANE 2", canvas.width * 0.5, 30);
         ctx.fillText("LANE 3", canvas.width * 0.85, 30);
      } else {
         // Gradient background fallback
         const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
         grad.addColorStop(0, "#1e1b4b"); grad.addColorStop(1, "#000000");
         ctx.fillStyle = grad;
         ctx.fillRect(0,0, canvas.width, canvas.height);
      }

      // --- Draw 3D ---
      const FAR_Z = 6000;
      const NEAR_Z = CAMERA_Z + 100;

      ctx.strokeStyle = "rgba(255,255,255,0.2)";
      ctx.lineWidth = 2;
      for (let l = -1.5; l <= 1.5; l += 1) {
        const x_world = l * LANE_WIDTH;
        const pFar = project({x: x_world, y: 0, z: FAR_Z});
        const pNear = project({x: x_world, y: 0, z: NEAR_Z});
        if (pFar && pNear) {
          ctx.beginPath(); ctx.moveTo(pNear.x, pNear.y); ctx.lineTo(pFar.x, pFar.y); ctx.stroke();
        }
      }

      let renderList = [];
      obstacles.forEach(o => renderList.push({ type: 'obs', data: o, z: o.z }));
      if (isGameRunning) renderList.push({ type: 'player', data: player, z: player.z });
      particles.forEach(p => renderList.push({ type: 'particle', data: p, z: p.z }));

      renderList.sort((a,b) => b.z - a.z);

      renderList.forEach(item => {
        if (item.type === 'obs') {
          drawBox(item.data.lane * LANE_WIDTH, item.data.y, item.data.z, item.data.width, item.data.height, 40, item.data.color);
        } else if (item.type === 'player') {
          drawBox(player.visualLane * LANE_WIDTH, player.y, player.z, player.width, player.height, 40, player.color);
        } else if (item.type === 'particle') {
          const p2d = project({x: item.data.x, y: item.data.y, z: item.data.z});
          if (p2d) {
             ctx.fillStyle = item.data.color;
             ctx.globalAlpha = item.data.life;
             ctx.beginPath(); ctx.arc(p2d.x, p2d.y, 5 * p2d.scale, 0, Math.PI*2); ctx.fill();
             ctx.globalAlpha = 1.0;
          }
        }
      });
    }

    function drawBox(wx, wy, wz, width, height, depth, color) {
      const wTop = wy + height;
      const wHalf = width / 2;
      const dHalf = depth / 2;

      let ftl = project({x: wx - wHalf, y: wTop, z: wz - dHalf});
      let ftr = project({x: wx + wHalf, y: wTop, z: wz - dHalf});
      let fbl = project({x: wx - wHalf, y: wy,   z: wz - dHalf});
      let fbr = project({x: wx + wHalf, y: wy,   z: wz - dHalf});
      let btl = project({x: wx - wHalf, y: wTop, z: wz + dHalf});
      let btr = project({x: wx + wHalf, y: wTop, z: wz + dHalf});
      
      if(!ftl || !ftr || !fbl || !fbr || !btl || !btr) return;

      ctx.fillStyle = shadeColor(color, -20);
      ctx.beginPath(); ctx.moveTo(ftl.x, ftl.y); ctx.lineTo(ftr.x, ftr.y); ctx.lineTo(btr.x, btr.y); ctx.lineTo(btl.x, btl.y); ctx.closePath(); ctx.fill();

      ctx.fillStyle = color;
      ctx.beginPath(); ctx.moveTo(ftl.x, ftl.y); ctx.lineTo(ftr.x, ftr.y); ctx.lineTo(fbr.x, fbr.y); ctx.lineTo(fbl.x, fbl.y); ctx.closePath(); ctx.fill();
      
      ctx.strokeStyle = "rgba(0,0,0,0.5)"; ctx.lineWidth = 1; ctx.stroke();
    }

    function shadeColor(color, percent) {
      let R = parseInt(color.substring(1,3),16); let G = parseInt(color.substring(3,5),16); let B = parseInt(color.substring(5,7),16);
      R = parseInt(R * (100 + percent) / 100); G = parseInt(G * (100 + percent) / 100); B = parseInt(B * (100 + percent) / 100);
      R = (R<255)?R:255; R = Math.max(0, R); G = (G<255)?G:255; G = Math.max(0, G); B = (B<255)?B:255; B = Math.max(0, B);
      let RR = ((R.toString(16).length==1)?"0"+R.toString(16):R.toString(16));
      let GG = ((G.toString(16).length==1)?"0"+G.toString(16):G.toString(16));
      let BB = ((B.toString(16).length==1)?"0"+B.toString(16):B.toString(16));
      return "#"+RR+GG+BB;
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
