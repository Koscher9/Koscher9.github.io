<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Body Runner - Singleplayer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #09090b;
      --text-main: #f8fafc;
      --accent: #eab308;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      color: var(--text-main);
      background-color: var(--bg);
      overflow: hidden;
      touch-action: none; /* Prevent browser swipe actions */
    }

    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(180deg, #1e1b4b 0%, #000000 100%);
    }

    .ui-layer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .back-btn {
      pointer-events: auto;
      padding: 0.8rem 1.5rem;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: var(--text-main);
      text-decoration: none;
      font-weight: 600;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }
    .back-btn:hover { background: rgba(255, 255, 255, 0.2); }

    .score-board {
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(234, 179, 8, 0.5);
    }

    .center-message {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: auto;
    }

    h1 {
      font-size: 4rem;
      margin-bottom: 2rem;
      background: linear-gradient(135deg, #fff 20%, #fef08a 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p.controls-hint {
      font-size: 1.2rem;
      color: #a1a1aa;
      margin-bottom: 2rem;
    }

    .play-btn {
      padding: 1rem 3rem;
      font-size: 1.5rem;
      font-weight: 800;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 99px;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(234, 179, 8, 0.4);
      transition: transform 0.2s;
    }
    .play-btn:active { transform: scale(0.95); }

    .hidden { display: none !important; }

    /* Mobile specific text sizes */
    @media (max-width: 768px) {
      h1 { font-size: 3rem; }
      .play-btn { padding: 0.8rem 2.5rem; font-size: 1.2rem; }
      .score-board { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <canvas id="gameCanvas"></canvas>

  <div class="ui-layer">
    <div class="header">
      <a href="index.html" class="back-btn">◀ Zurück</a>
      <div class="score-board" id="scoreValue">0</div>
    </div>

    <!-- Start / Game Over Screen -->
    <div class="center-message" id="menuScreen">
      <h1 id="menuTitle">Body Runner</h1>
      <p class="controls-hint">Pfeiltasten oder Wischen: Links/Rechts, Hoch springen, Runter rollen.</p>
      <button class="play-btn" id="startBtn">START</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const menuScreen = document.getElementById('menuScreen');
    const menuTitle = document.getElementById('menuTitle');
    const startBtn = document.getElementById('startBtn');
    const scoreValue = document.getElementById('scoreValue');

    // Make canvas full screen
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // -----------------------------------------------------------------
    // 3D Engine Constants & Variables
    // -----------------------------------------------------------------
    const FOV = 400; // Focal length
    const CAMERA_Y = 150; // Camera height above ground
    const CAMERA_Z = -300; // Camera distance from player origin (0)

    let isGameRunning = false;
    let score = 0;
    let baseSpeed = 2000; // units per second (z axis)
    let speed = baseSpeed;
    
    // Player Properties
    const player = {
      lane: 0,       // -1 (Left), 0 (Center), 1 (Right)
      y: 0,          // 0 is ground. > 0 is jump.
      z: 0,          // Fixed at 0
      width: 60,
      height: 120,
      color: '#38bdf8', // Light blue
      isJumping: false,
      isRolling: false,
      rollTimer: 0,
      jumpVelocity: 0,
      gravity: -2000, // units per sec squared
      jumpPower: 800
    };

    const LANE_WIDTH = 150;
    let obstacles = [];
    let particles = [];
    
    let lastTime = 0;
    let spawnTimer = 0;

    // -----------------------------------------------------------------
    // Controls: Keyboard & Touch
    // -----------------------------------------------------------------
    function moveLeft() { if(isGameRunning && player.lane > -1 && player.y <= 0) player.lane--; }
    function moveRight() { if(isGameRunning && player.lane < 1 && player.y <= 0) player.lane++; }
    
    function startJump() {
      if (isGameRunning && !player.isJumping && !player.isRolling) {
        player.isJumping = true;
        player.jumpVelocity = player.jumpPower;
      }
    }

    function startRoll() {
      if (isGameRunning && !player.isJumping && !player.isRolling) {
        player.isRolling = true;
        player.rollTimer = 0.6; // Roll lasts 0.6 seconds
        player.height = 60; // duck
      } else if (isGameRunning && player.isJumping) {
        // fast fall if jumping
        player.jumpVelocity = -player.jumpPower; 
      }
    }

    window.addEventListener('keydown', (e) => {
      if(e.key === 'ArrowLeft' || e.key === 'a') moveLeft();
      if(e.key === 'ArrowRight' || e.key === 'd') moveRight();
      if(e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') startJump();
      if(e.key === 'ArrowDown' || e.key === 's') startRoll();
    });

    // Touch logic
    let touchStartX = 0;
    let touchStartY = 0;

    window.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
      touchStartY = e.changedTouches[0].screenY;
    }, {passive: false});

    window.addEventListener('touchend', (e) => {
      if(!isGameRunning) return;
      let touchEndX = e.changedTouches[0].screenX;
      let touchEndY = e.changedTouches[0].screenY;
      
      let dx = touchEndX - touchStartX;
      let dy = touchEndY - touchStartY;
      
      if (Math.abs(dx) > Math.abs(dy)) {
        // Horizontal
        if (Math.abs(dx) > 40) {
          if (dx > 0) moveRight();
          else moveLeft();
        }
      } else {
        // Vertical
        if (Math.abs(dy) > 40) {
          if (dy > 0) startRoll(); // swipe down
          else startJump(); // swipe up
        }
      }
    }, {passive: false});


    // -----------------------------------------------------------------
    // Game Logic
    // -----------------------------------------------------------------
    function resetGame() {
      player.lane = 0;
      player.y = 0;
      player.isJumping = false;
      player.isRolling = false;
      player.height = 120;
      obstacles = [];
      particles = [];
      score = 0;
      speed = baseSpeed;
      lastTime = performance.now();
      isGameRunning = true;
      menuScreen.classList.add('hidden');
      requestAnimationFrame(gameLoop);
    }

    startBtn.addEventListener('click', resetGame);

    function spawnObstacle() {
      const type = Math.random() < 0.3 ? 'UPPER' : 'LOWER'; // Upper = Need to roll, Lower = Need to jump
      
      // Random lane: -1, 0, or 1
      const lane = Math.floor(Math.random() * 3) - 1;
      
      // We can also spawn multiple at once if we want, but single is fine for now
      obstacles.push({
        lane: lane,
        z: 4000,     // Spawn far away
        y: type === 'UPPER' ? 100 : 0,  // y=0 is ground, y=100 is floating
        type: type,  
        width: 100,
        height: type === 'UPPER' ? 40 : 80,
        color: type === 'UPPER' ? '#f43f5e' : '#eab308' // red vs yellow
      });
    }

    function createExplosion(x, y, z, color) {
      for(let i=0; i<20; i++) {
        particles.push({
          x: x, y: y, z: z,
          vx: (Math.random() - 0.5) * 500,
          vy: Math.random() * 500,
          vz: (Math.random() - 0.5) * 500,
          life: 1.0,
          color: color
        });
      }
    }

    // -----------------------------------------------------------------
    // Render pipeline
    // -----------------------------------------------------------------
    
    // Project 3D point to 2D screen
    function project(p3) {
      // Relative to camera
      const dz = p3.z - CAMERA_Z; 
      if (dz <= 0) return null; // Behind camera

      const scale = FOV / dz;
      // Screen centers
      const cx = canvas.width / 2;
      const cy = canvas.height / 2; // Actually we might want horizon a bit higher

      // Math: Y is up in 3D, but down in 2D canvas
      const px = cx + (p3.x * scale);
      // y is inverted!
      const py = cy - ((p3.y - CAMERA_Y) * scale); 
      
      return { x: px, y: py, scale: scale };
    }

    function gameLoop(time) {
      if (!isGameRunning) return;
      let dt = (time - lastTime) / 1000;
      if (dt > 0.1) dt = 0.1; // clamp dt to avoid huge skips
      lastTime = time;

      update(dt);
      draw();

      requestAnimationFrame(gameLoop);
    }

    function update(dt) {
      score += dt * 10;
      speed = baseSpeed + (score * 5); // Speed increases with score
      scoreValue.innerText = Math.floor(score);

      // Player jump/roll physics
      if (player.isJumping) {
        player.y += player.jumpVelocity * dt;
        player.jumpVelocity += player.gravity * dt;
        if (player.y <= 0) {
          player.y = 0;
          player.isJumping = false;
        }
      }

      if (player.isRolling) {
        player.rollTimer -= dt;
        if (player.rollTimer <= 0) {
          player.isRolling = false;
          player.height = 120; // stand up
        }
      }

      // Spawns
      spawnTimer -= dt;
      if (spawnTimer <= 0) {
        spawnObstacle();
        spawnTimer = 2000 / speed + (Math.random() * 0.5); // Faster spawns as speed increases
      }

      // Obstacles update
      for (let i = obstacles.length - 1; i >= 0; i--) {
        let obs = obstacles[i];
        obs.z -= speed * dt;

        // Collision logic
        if (obs.z > -50 && obs.z < 50 && obs.lane === player.lane) {
          // In same depth and lane. Check Y collision
          // Player bounds:
          let pBottom = player.y; 
          let pTop = player.y + player.height;
          
          // Obstacle bounds:
          let oBottom = obs.y;
          let oTop = obs.y + obs.height;

          // Check overlap
          if (pTop > oBottom && pBottom < oTop) {
            // CRASH!
            gameOver();
          }
        }

        if (obs.z < CAMERA_Z) {
          obstacles.splice(i, 1);
        }
      }

      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += player.gravity * dt * 0.5; // less gravity
        p.z += p.vz * dt;
        p.z -= speed * dt; // travel towards camera
        p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function gameOver() {
      isGameRunning = false;
      createExplosion(player.lane * LANE_WIDTH, player.y + player.height/2, player.z, player.color);
      
      // Draw one last frame with explosion
      draw();
      
      setTimeout(() => {
        menuTitle.innerText = "Game Over!";
        startBtn.innerText = "NEUSTART";
        menuScreen.classList.remove('hidden');
      }, 1000);
    }

    function draw() {
      // Clear
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw Grid / Ground horizon
      ctx.strokeStyle = "rgba(255,255,255,0.1)";
      ctx.lineWidth = 2;
      
      const FAR_Z = 5000;
      const NEAR_Z = CAMERA_Z + 100;

      // Draw lane lines
      for (let l = -1.5; l <= 1.5; l += 1) {
        const x_world = l * LANE_WIDTH;
        const pFar = project({x: x_world, y: 0, z: FAR_Z});
        const pNear = project({x: x_world, y: 0, z: NEAR_Z});
        
        if (pFar && pNear) {
          ctx.beginPath();
          ctx.moveTo(pNear.x, pNear.y);
          ctx.lineTo(pFar.x, pFar.y);
          ctx.stroke();
        }
      }

      // Sort objects by Z to draw back-to-front (Painters algorithm)
      // Player is at Z = 0
      
      let renderList = [];
      
      // Add obstacles
      obstacles.forEach(o => {
        renderList.push({ type: 'obs', data: o, z: o.z });
      });
      
      // Add player if alive
      if (isGameRunning) {
        renderList.push({ type: 'player', data: player, z: player.z });
      }

      // Add particles
      particles.forEach(p => {
        renderList.push({ type: 'particle', data: p, z: p.z });
      });

      // Sort descending (furthest first)
      renderList.sort((a,b) => b.z - a.z);

      // Draw
      renderList.forEach(item => {
        if (item.type === 'obs') {
          drawBox(item.data.lane * LANE_WIDTH, item.data.y, item.data.z, item.data.width, item.data.height, 40, item.data.color);
        } else if (item.type === 'player') {
          drawPlayer();
        } else if (item.type === 'particle') {
          const p2d = project({x: item.data.x, y: item.data.y, z: item.data.z});
          if (p2d) {
             ctx.fillStyle = item.data.color;
             ctx.globalAlpha = item.data.life;
             ctx.beginPath();
             ctx.arc(p2d.x, p2d.y, 5 * p2d.scale, 0, Math.PI*2);
             ctx.fill();
             ctx.globalAlpha = 1.0;
          }
        }
      });
    }

    // A helper to draw a simple 3D looking box primitive
    function drawBox(wx, wy, wz, width, height, depth, color) {
      // 8 corners
      // Top/Bottom relative to wy. Left/Right relative to wx. Front/Back relative to wz.
      // wy is BOTTOM of box
      const wTop = wy + height;
      const wHalf = width / 2;
      const dHalf = depth / 2;

      // Project corners:
      // Front face
      let ftl = project({x: wx - wHalf, y: wTop, z: wz - dHalf});
      let ftr = project({x: wx + wHalf, y: wTop, z: wz - dHalf});
      let fbl = project({x: wx - wHalf, y: wy,   z: wz - dHalf});
      let fbr = project({x: wx + wHalf, y: wy,   z: wz - dHalf});

      // Back face (if we want, but since they are boxes, front face covers back mostly)
      let btl = project({x: wx - wHalf, y: wTop, z: wz + dHalf});
      let btr = project({x: wx + wHalf, y: wTop, z: wz + dHalf});
      
      if(!ftl || !ftr || !fbl || !fbr || !btl || !btr) return;

      // Draw Top Face (if below camera horizon)
      // Just visually filling a polygon
      ctx.fillStyle = shadeColor(color, -20);
      ctx.beginPath();
      ctx.moveTo(ftl.x, ftl.y);
      ctx.lineTo(ftr.x, ftr.y);
      ctx.lineTo(btr.x, btr.y);
      ctx.lineTo(btl.x, btl.y);
      ctx.closePath();
      ctx.fill();

      // Front face
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(ftl.x, ftl.y);
      ctx.lineTo(ftr.x, ftr.y);
      ctx.lineTo(fbr.x, fbr.y);
      ctx.lineTo(fbl.x, fbl.y);
      ctx.closePath();
      ctx.fill();
      
      // Outline
      ctx.strokeStyle = "rgba(0,0,0,0.5)";
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function drawPlayer() {
      // We can use the simple drawBox for the player too
      drawBox(player.lane * LANE_WIDTH, player.y, player.z, player.width, player.height, 40, player.color);
      
      // Optionally draw a shadow underneath
      let shadowProj = project({x: player.lane * LANE_WIDTH, y: 0, z: player.z});
      if (shadowProj) {
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.beginPath();
        ctx.ellipse(shadowProj.x, shadowProj.y, (player.width/2) * shadowProj.scale, 10 * shadowProj.scale, 0, 0, Math.PI*2);
        ctx.fill();
      }
    }

    // Helper for darker colors
    function shadeColor(color, percent) {
      let R = parseInt(color.substring(1,3),16);
      let G = parseInt(color.substring(3,5),16);
      let B = parseInt(color.substring(5,7),16);

      R = parseInt(R * (100 + percent) / 100);
      G = parseInt(G * (100 + percent) / 100);
      B = parseInt(B * (100 + percent) / 100);

      R = (R<255)?R:255; R = Math.max(0, R);
      G = (G<255)?G:255; G = Math.max(0, G);
      B = (B<255)?B:255; B = Math.max(0, B);

      let RR = ((R.toString(16).length==1)?"0"+R.toString(16):R.toString(16));
      let GG = ((G.toString(16).length==1)?"0"+G.toString(16):G.toString(16));
      let BB = ((B.toString(16).length==1)?"0"+B.toString(16):B.toString(16));

      return "#"+RR+GG+BB;
    }

    // Initialize (static background)
    draw();

  </script>
</body>
</html>
