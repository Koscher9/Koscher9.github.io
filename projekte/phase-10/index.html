<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 10</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>

<body>
    <!-- Connection Overlay -->
    <div id="connection-overlay" class="overlay" style="display: none;">
        <h2 class="overlay-title">Phase 10 Multiplayer</h2>
        <p id="conn-status" class="overlay-text">Initialisiere Verbindung...</p>
    </div>

    <!-- Game Over / Round Summary Overlay -->
    <div id="summary-overlay" class="overlay" style="display: none;">
        <h2 id="summary-title" class="overlay-title">Runde Beendet!</h2>
        <p id="summary-text" class="overlay-text">Auswertung...</p>
        <button id="btn-next-round" class="btn">Nächste Runde starten</button>
    </div>

    <!-- Header / Status Bar -->
    <header class="top-bar">
        <div class="player-info opponent-info">
            <div class="info-label">Gegner</div>
            <div id="opponent-status" class="info-value">Wartet...</div>
        </div>

        <div class="game-center-info">
            <h1 class="game-title">Phase 10</h1>
            <div id="turn-indicator" class="turn-indicator">Warten auf Spieler...</div>
        </div>

        <div class="player-info my-info">
            <div class="info-label">Du</div>
            <div id="my-status" class="info-value">Phase 1</div>
        </div>
    </header>

    <!-- Main Game Area -->
    <main class="game-board">
        <!-- Piles (Draw & Discard) -->
        <section class="piles-area">
            <div class="pile" id="draw-pile">
                <div class="pile-label">Nachziehstapel</div>
                <div class="card card-back" id="deck-card">
                    <div class="card-inner">Phase 10</div>
                </div>
            </div>
            <div class="pile" id="discard-pile">
                <div class="pile-label">Ablagestapel</div>
                <div id="discard-top" class="card empty-slot"></div>
            </div>
        </section>

        <!-- Play Area (Where phases are laid out) -->
        <section class="play-area" id="play-area">
            <div class="play-zone" id="opponent-play-zone">
                <div class="zone-label">Gegnerische Phasen</div>
                <div class="phase-container" id="opponent-phase-container">
                    <!-- Laid out cards will appear here -->
                </div>
            </div>

            <div class="divider"></div>

            <div class="play-zone" id="my-play-zone">
                <div class="zone-label">Deine Phasen</div>
                <div class="phase-container" id="my-phase-container">
                    <!-- Laid out cards will appear here -->
                </div>
            </div>
        </section>
    </main>

    <!-- Bottom Area (Hand & Controls) -->
    <footer class="bottom-area">
        <div class="hand-controls">
            <button id="btn-play-phase" class="btn btn-action" disabled>Ausgewählte als Phase auslegen</button>
            <button id="btn-hit-card" class="btn btn-action" disabled>Anlegen an Phase</button>
            <button id="btn-discard" class="btn btn-danger" disabled>Ausgewählte abwerfen</button>
        </div>

        <div class="my-hand" id="my-hand">
            <!-- Cards will be injected here -->
        </div>

        <div class="footer-bar">
            <a href="../../index.html" id="back-btn" class="btn btn-outline">Zurück zur Übersicht</a>
            <div id="current-phase-desc" class="phase-desc">Ziel: 2 Drillinge</div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
